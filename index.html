<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRILEC Bénin - Menu Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 4px solid #ea580c; color: #ea580c; font-weight: 800; }
        .hidden { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .menu-card { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .img-box { background-color: #f3f4f6; display: flex; align-items: center; justify-content: center; min-height: 112px; }
    </style>
</head>
<body class="bg-gray-100 font-sans" onload="initApp()">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl pb-24 relative">
        
        <header class="bg-green-800 text-white p-6 text-center shadow-lg">
            <h1 class="text-2xl font-bold tracking-tighter uppercase">Agrilec Bénin</h1>
            <p class="text-[10px] tracking-widest opacity-80 uppercase">Saveurs & Nature</p>
        </header>

        <div id="view-home" class="p-6 space-y-6">
            <button onclick="showRestaurant()" class="w-full bg-orange-500 text-white p-12 rounded-3xl text-2xl font-black shadow-xl border-b-8 border-orange-700 active:translate-y-1 transition-all uppercase">🍴 Restaurant</button>
            <button onclick="showMarche()" class="w-full bg-green-600 text-white p-12 rounded-3xl text-2xl font-black shadow-xl border-b-8 border-green-800 active:translate-y-1 transition-all uppercase">🍎 Le Marché</button>
        </div>

        <div id="view-restaurant" class="hidden">
            <div class="flex items-center p-4 bg-white sticky top-0 z-20 shadow-sm border-b">
                <button onclick="goHome()" class="text-2xl mr-4">🏠</button>
                <div class="flex overflow-x-auto no-scrollbar space-x-6">
                    <button onclick="renderCat('entrees')" class="nav-tab flex-none py-2 text-xs uppercase font-bold">Entrées</button>
                    <button onclick="renderCat('terre')" class="nav-tab flex-none py-2 text-xs uppercase font-bold">Terre</button>
                    <button onclick="renderCat('mer')" class="nav-tab flex-none py-2 text-xs uppercase font-bold">Mer</button>
                    <button onclick="renderCat('boissons')" class="nav-tab flex-none py-2 text-xs uppercase font-bold">Boissons</button>
                </div>
            </div>
            <div id="restaurant-items" class="p-4 space-y-4"></div>
        </div>
    </div>

    <script>
        let currentCategory = 'entrees';
        
        // Ici, j'ai lié tes fichiers 1, 2, 3, 4, 5 aux premiers plats
        // Tu pourras changer les noms des images (1.jpg, 2.jpg...) selon tes besoins
        const menuData = {
            entrees: [
                { id: 'e1', name: 'Salade AGRILEC', price: '3000 FCFA', desc: 'Œuf de caille, légumes frais', img: 'images/1.jpg' },
                { id: 'e2', name: 'Salade Paysanne', price: '1500 FCFA', desc: 'Fromage peulh et crudités', img: 'images/2.jpg' }
            ],
            terre: [
                { id: 't1', name: 'Riz au Lapin', price: '3500 FCFA', desc: 'Spécialité maison', img: 'images/3.jpg' },
                { id: 't2', name: 'Brochettes de Boeuf', price: '2000 FCFA', desc: 'Accompagnées de frites', img: 'images/4.jpg' }
            ],
            mer: [
                { id: 'm1', name: 'Tchep Dorade', price: '3500 FCFA', desc: 'Poisson frais braisé', img: 'images/5.jpg' }
            ],
            boissons: [
                { id: 'b1', name: 'Jus Naturel', price: '1500 FCFA', desc: 'Fait maison', img: 'images/6.jpg' }
            ]
        };

        function initApp() { renderCat('entrees'); }

        function renderCat(cat) {
            currentCategory = cat;
            const container = document.getElementById('restaurant-items');
            container.innerHTML = '';
            document.querySelectorAll('.nav-tab').forEach(t => {
                t.classList.remove('active-tab');
                if(t.innerText.toLowerCase().includes(cat.substring(0,3))) t.classList.add('active-tab');
            });
            menuData[cat].forEach(item => {
                container.innerHTML += `
                    <div class="flex bg-white border border-gray-100 rounded-3xl overflow-hidden shadow-sm menu-card">
                        <div class="w-1/3 h-28 img-box">
                            <img src="${item.img}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150?text=Agrilec'">
                        </div>
                        <div class="w-2/3 p-4 flex flex-col justify-between">
                            <h3 class="font-bold text-gray-800 text-sm">${item.name}</h3>
                            <p class="text-[9px] text-gray-400">${item.desc}</p>
                            <div class="flex justify-between items-center">
                                <span class="text-orange-600 font-black text-xs">${item.price}</span>
                                <button onclick="order('${item.name}')" class="bg-green-700 text-white px-3 py-1 rounded-full text-[10px] font-bold">Commander</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function showRestaurant() { document.getElementById('view-home').classList.add('hidden'); document.getElementById('view-restaurant').classList.remove('hidden'); }
        function showMarche() { alert("Le marché arrive bientôt !"); }
        function goHome() { location.reload(); }
        function order(n) { window.location.href = "https://wa.me/22944070883?text=Je commande : " + n; }
    </script>
</body>
</html>
